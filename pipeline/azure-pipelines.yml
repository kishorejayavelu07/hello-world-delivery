trigger:
  branches:
    include:
      - main
      - develop

stages:

- stage: SecurityScan
  jobs:
  - job: GitleaksScan
    steps:
    - script: |
        docker run --rm -v $(Build.SourcesDirectory):/repo zricethezav/gitleaks detect
      displayName: "Run Gitleaks Secret Scan"

- stage: Build
  dependsOn: SecurityScan
  jobs:
  - job: BuildApp
    steps:
    - task: NodeTool@0
      inputs:
        versionSpec: '18.x'

    - script: |
        npm install
      workingDirectory: app

    - script: |
        npm run lint
      workingDirectory: app
      displayName: "Run ESLint"

    - task: PublishBuildArtifacts@1
      inputs:
        pathToPublish: 'app'
        artifactName: 'app'

